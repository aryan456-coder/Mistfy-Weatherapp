<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistify Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-clear">

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div id="loader">
  <div class="spinner"></div>
  <p class="loader-text">Fetching weather…</p>
</div>

<div id="errorToast">City not found. Please try again.</div>

<main id="app">

  <header class="glass">
    <div class="brand">⛅ <span>Mistify</span>Weather</div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search city…" autocomplete="off" spellcheck="false">
      <button id="searchBtn" aria-label="Search">
  <svg xmlns="http://www.w3.org/2000/svg" 
       fill="none" 
       viewBox="0 0 24 24" 
       stroke="white" 
       stroke-width="2.8">
       
    <circle cx="11" cy="11" r="7"></circle>
    <line x1="20" y1="20" x2="16.5" y2="16.5"></line>
    
  </svg>
</button>
    </div>
    <button id="locBtn" aria-label="Use my location">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>
      </svg>
      <span>My Location</span>
    </button>
  </header>

  <div id="welcome" class="glass">
    <div class="welcome-icon">🌤️</div>
    <h2>What's the weather like?</h2>
    <p>Search for any city to get a live, beautiful forecast.</p>
  </div>

  <div id="mainCard" class="glass" style="display:none;">
    <div class="weather-main">
      <div class="weather-left">
        <div id="locBadge" class="loc-badge" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
          Your Location
        </div>
        <div class="city-name" id="cityName">—</div>
        <div class="city-date" id="cityDate">—</div>
        <div class="temp-block">
          <div class="temp-value" id="tempVal">—</div>
          <div class="temp-unit">°C</div>
        </div>
        <div class="condition-row">
          <span class="condition-icon" id="condIcon"></span>
          <span class="condition-text" id="condText">—</span>
        </div>
      </div>
      <div class="weather-right">
        <div class="big-weather-icon" id="bigIcon">🌤️</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-icon">🌡️</span>
        <span class="stat-label">Feels Like</span>
        <span class="stat-value" id="feelsLike">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">💧</span>
        <span class="stat-label">Humidity</span>
        <span class="stat-value" id="humidity">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">💨</span>
        <span class="stat-label">Wind</span>
        <span class="stat-value" id="windSpeed">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">👁️</span>
        <span class="stat-label">Visibility</span>
        <span class="stat-value" id="visibility">—</span>
      </div>
    </div>
  </div>

  <div id="hourlySection" class="glass" style="display:none;">
    <div class="section-title">Hourly Forecast</div>
    <div class="hourly-scroll" id="hourlyScroll"></div>
  </div>

  <div id="forecastSection" class="glass" style="display:none;">
    <div class="section-title">5-Day Forecast</div>
    <div class="forecast-grid" id="forecastGrid"></div>
  </div>

  <div id="sunCard" class="glass" style="display:none;">
    <div class="sun-half">
      <div class="sun-icon">🌅</div>
      <div class="sun-info">
        <span class="sun-label">Sunrise</span>
        <span class="sun-time" id="sunriseTime">—</span>
      </div>
    </div>
    <div class="sun-half">
      <div class="sun-icon">🌇</div>
      <div class="sun-info">
        <span class="sun-label">Sunset</span>
        <span class="sun-time" id="sunsetTime">—</span>
      </div>
    </div>
  </div>

</main>

<script src="./script.js">
</script>
</body>
</html>
